<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiz Tech Exercise - ToDo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 600px;">
        <h2 class="mb-4 text-center fw-bold text-primary">Wiz Exercise - Task Manager</h2>
        
        <form action="/add" method="POST" class="input-group mb-4 shadow-sm">
            <input type="text" name="title" class="form-control" placeholder="Add a new task..." required>
            <button class="btn btn-primary" type="submit">Add Task</button>
        </form>

        <ul class="list-group shadow-sm">
            {% for todo in todos %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span class="{% if todo.completed %}text-decoration-line-through text-muted{% endif %}">
                    {{ todo.title }}
                </span>
                <div>
                    {% if not todo.completed %}
                    <form action="/complete/{{ todo._id }}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-success">Complete</button>
                    </form>
                    {% endif %}
                    <form action="/delete/{{ todo._id }}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </div>
            </li>
            {% else %}
            <li class="list-group-item text-center text-muted">No tasks found in MongoDB.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
