name: "2. Application Container CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'app/**'
      - 'k8s-app.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app/**'
      - 'k8s-app.yaml'

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  build-scan-deploy:
    name: "Build, Scan, Push & Deploy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Local Container Image
        run: |
          docker build -t us-central1-docker.pkg.dev/clgcporg10-185/wiz-repo/wiz-web-app:${{ github.sha }} ./app

      # 1. Dependency SARIF Scan for GitHub Code Scanning (Requirements.txt)
      - name: Run Trivy FS Scanner for App Dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload App Dependency SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-app-dependencies'

      # 2. Container Image Scan published to GitHub Step Summary (OS & Container CVEs)
      - name: Run Trivy Container Image Scan (Markdown Report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'us-central1-docker.pkg.dev/clgcporg10-185/wiz-repo/wiz-web-app:${{ github.sha }}'
          format: 'table'
          output: 'trivy-container-report.md'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Publish Container Scan to GitHub Job Summary
        if: always()
        run: |
          echo "## 🐳 Container Image Vulnerability Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-container-report.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # 3. Authenticate & Deploy to GKE
      - name: Authenticate to GCP via Workload Identity Federation
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/1009564646348/locations/global/workloadIdentityPools/wiz-github-pool/providers/wiz-github-provider'
          service_account: 'wiz-vm-sa@clgcporg10-185.iam.gserviceaccount.com'

      - name: Configure Docker CLI for GCP
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Push Image to Google Artifact Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push us-central1-docker.pkg.dev/clgcporg10-185/wiz-repo/wiz-web-app:${{ github.sha }}

      - name: Get GKE Credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: 'wiz-gke-cluster'
          location: 'us-central1'

      - name: Deploy to Private GKE Cluster
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl apply -f k8s-app.yaml
          kubectl set image deployment/wiz-web-app *=us-central1-docker.pkg.dev/clgcporg10-185/wiz-repo/wiz-web-app:${{ github.sha }}
          kubectl rollout status deployment/wiz-web-app
