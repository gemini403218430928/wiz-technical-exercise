name: "1. IaC DevSecOps Pipeline"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write # Required for WIF keyless auth
  security-events: write

jobs:
  iac-security-scan:
    name: "Scan Terraform Code (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Requirement: Pipeline security scanning prior to deployment
      - name: Run Checkov IaC Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          directory: 'terraform/'
          framework: 'terraform'
          output_format: 'cli,sarif'
          output_file_path: 'console,results.sarif'
          soft_fail: true

      - name: Upload Checkov SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'results.sarif'

  terraform-deploy:
    name: "Deploy Infrastructure"
    needs: iac-security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Keyless GCP Auth via Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/wiz-github-pool/providers/wiz-github-provider'
          service_account: 'wiz-vm-sa@clgcporg10-185.iam.gserviceaccount.com'

      - uses: hashicorp/setup-terraform@v2

      # Requirement: CI/CD pipeline to deploy exercise as IaC
      - name: Terraform Init & Apply
        run: |
          cd terraform/
          terraform init
          terraform apply -auto-approve